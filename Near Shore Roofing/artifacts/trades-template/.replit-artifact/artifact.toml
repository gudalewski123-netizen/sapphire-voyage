kind = "web"
previewPath = "/"
title = "Trades Website Template"
version = "1.0.0"
id = "artifacts/trades-template"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20624

[services.development]
run = "pnpm --filter @workspace/trades-template run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trades-template", "run", "build" ]
publicDir = "artifacts/trades-template/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20624"
BASE_PATH = "/"
