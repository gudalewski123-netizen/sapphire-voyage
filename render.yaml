services:
  - type: web
    name: sapphire-voyage-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: "NODE_ENV=development pnpm install --no-frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build"
    startCommand: "pnpm --filter @workspace/api-server run start"
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LEAD_NOTIFY_TO
        value: gudalewski123@gmail.com
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      # Emergency-only break-glass admin login. Any username + this password is accepted.
      # Leave set so you can recover access if you forget the in-app credentials.
      - key: ADMIN_PASSWORD
        generateValue: true
      # Stripe (uncomment if site sells)
      # - key: STRIPE_SECRET_KEY
      #   sync: false
      # - key: STRIPE_PUBLISHABLE_KEY
      #   sync: false
      # - key: STRIPE_WEBHOOK_SECRET
      #   sync: false
